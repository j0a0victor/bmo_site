<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Bimo AI</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
}

.avatar {
    width: 150px;
    height: 150px;
    background: #22c55e;
    border-radius: 20px;
    margin: 20px auto;
    transition: 0.3s;
}

.chat {
    height: 300px;
    overflow-y: auto;
    background: #1e293b;
    padding: 10px;
    border-radius: 10px;
}

.msg {
    margin: 10px 0;
}

.user {
    text-align: right;
}

.bot {
    text-align: left;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: #3b82f6;
    color: white;
    font-size: 16px;
}

button.recording {
    background: #ef4444;
}

.status {
    text-align: center;
    margin-top: 10px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

    <div class="avatar" id="avatar"></div>

    <div class="chat" id="chat"></div>

    <button id="btn" onclick="toggleRecording()">🎤 Falar</button>

    <div class="status" id="status">Pronto</div>

</div>

<script>
const API_URL = "https://SEU-APP.onrender.com/voice";

let mediaRecorder;
let audioChunks = [];
let recording = false;
let listeningWakeWord = false;

const btn = document.getElementById("btn");
const statusEl = document.getElementById("status");
const avatar = document.getElementById("avatar");
const chat = document.getElementById("chat");

// sons
const startSound = new Audio("https://actions.google.com/sounds/v1/ui/click.ogg");
const stopSound = new Audio("https://actions.google.com/sounds/v1/ui/confirm.ogg");

// ----------------------
// WAKE WORD (BIMO)
// ----------------------
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

let recognition;

function startWakeWord() {
    if (!SpeechRecognition) {
        alert("Seu navegador não suporta reconhecimento de voz 😢");
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = "pt-BR";
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onstart = () => {
        listeningWakeWord = true;
        statusEl.innerText = "Aguardando 'Bimo'...";
    };

    recognition.onresult = (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();

        console.log("Ouvi:", transcript);

        if (transcript.includes("bimo") && !recording) {
            console.log("🔥 Wake word detectada!");

            recognition.stop();
            startRecording();
        }
    };

    recognition.onend = () => {
        if (listeningWakeWord && !recording) {
            recognition.start(); // reinicia sozinho
        }
    };

    recognition.start();
}

// botão agora ativa wake word
btn.onclick = () => {
    startWakeWord();
    btn.innerText = "🟢 Bimo ativo";
};

// ----------------------
// GRAVAÇÃO REAL
// ----------------------
async function startRecording() {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    mediaRecorder = new MediaRecorder(stream, {
        mimeType: "audio/webm"
    });

    audioChunks = [];

    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = sendAudio;

    mediaRecorder.start();

    recording = true;
    statusEl.innerText = "Ouvindo pergunta...";
    avatar.style.background = "#facc15";

    startSound.play();

    // grava por 4 segundos automaticamente
    setTimeout(() => {
        stopRecording();
    }, 4000);
}

function stopRecording() {
    if (mediaRecorder && recording) {
        mediaRecorder.stop();
    }

    recording = false;
    statusEl.innerText = "Pensando...";
    avatar.style.background = "#3b82f6";

    stopSound.play();
}

// ----------------------
// ENVIO
// ----------------------
async function sendAudio() {
    const blob = new Blob(audioChunks, { type: "audio/webm" });

    const formData = new FormData();
    formData.append("file", blob, "audio.webm");

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        if (data.error) {
            statusEl.innerText = data.error;
            avatar.style.background = "#ef4444";
            return;
        }

        addMessage(data.text, "user");
        addMessage(data.reply, "bot");

        statusEl.innerText = "Falando...";
        avatar.style.background = "#22c55e";

        const bytes = Uint8Array.from(
            data.audio.match(/.{1,2}/g).map(b => parseInt(b, 16))
        );

        const audioBlob = new Blob([bytes], { type: "audio/wav" });
        const audio = new Audio(URL.createObjectURL(audioBlob));

        audio.play();

        audio.onended = () => {
            statusEl.innerText = "Aguardando 'Bimo'...";
            avatar.style.background = "#22c55e";

            // volta a escutar wake word
            startWakeWord();
        };

    } catch (err) {
        console.error(err);
        statusEl.innerText = "Erro";
    }
}

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = `msg ${type}`;
    div.innerText = text;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>

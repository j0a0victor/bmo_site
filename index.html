<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Bimo AI</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
}

.avatar {
    width: 150px;
    height: 150px;
    background: #22c55e;
    border-radius: 20px;
    margin: 20px auto;
    transition: 0.3s;
}

.chat {
    height: 300px;
    overflow-y: auto;
    background: #1e293b;
    padding: 10px;
    border-radius: 10px;
}

.msg {
    margin: 10px 0;
}

.user {
    text-align: right;
}

.bot {
    text-align: left;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: #3b82f6;
    color: white;
    font-size: 16px;
}

.status {
    text-align: center;
    margin-top: 10px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

    <div class="avatar" id="avatar"></div>

    <div class="chat" id="chat"></div>

    <button id="btn">Ativar Bimo</button>

    <div class="status" id="status">Pronto</div>

</div>

<script>
const API_URL = "/voice";

let mediaRecorder;
let audioChunks = [];
let recording = false;
let listeningWakeWord = false;
let lastAudio = null;

const btn = document.getElementById("btn");
const statusEl = document.getElementById("status");
const avatar = document.getElementById("avatar");
const chat = document.getElementById("chat");

const startSound = new Audio("https://actions.google.com/sounds/v1/ui/click.ogg");
const stopSound = new Audio("https://actions.google.com/sounds/v1/ui/confirm.ogg");

// ----------------------
// WAKE WORD
// ----------------------
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;

btn.onclick = () => {
    startWakeWord();
    btn.innerText = "🟢 Bimo ativo";
};

function startWakeWord() {
    if (!SpeechRecognition) {
        alert("Seu navegador não suporta reconhecimento de voz");
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = "pt-BR";
    recognition.continuous = true;
    recognition.interimResults = false;

    recognition.onstart = () => {
        listeningWakeWord = true;
        statusEl.innerText = "Aguardando 'Bimo'...";
    };

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript.toLowerCase();

        console.log("Ouvi:", transcript);

        const wakeWords = ["bimo", "bibo", "nimo", "bingo"];

        if (wakeWords.some(word => transcript.includes(word)) && !recording) {
            recognition.stop();
            startRecording();
        }
    };

    recognition.onerror = (e) => {
        console.log("Erro reconhecimento:", e);
    };

    recognition.onend = () => {
        if (!recording) {
            setTimeout(() => {
                recognition.start();
            }, 500);
        }
    };

    recognition.start();
}

// ----------------------
// GRAVAÇÃO COM SILÊNCIO
// ----------------------
async function startRecording() {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    const audioContext = new AudioContext();
    const source = audioContext.createMediaStreamSource(stream);
    const analyser = audioContext.createAnalyser();

    source.connect(analyser);

    const data = new Uint8Array(analyser.fftSize);

    mediaRecorder = new MediaRecorder(stream, {
        mimeType: "audio/webm"
    });

    audioChunks = [];

    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = sendAudio;

    mediaRecorder.start();

    recording = true;
    statusEl.innerText = "Ouvindo...";
    avatar.style.background = "#facc15";

    startSound.play();

    let silenceStart = null;

    function detectSilence() {
        analyser.getByteTimeDomainData(data);

        let volume = data.reduce((a, b) => a + Math.abs(b - 128), 0) / data.length;

        if (volume < 5) {
            if (!silenceStart) silenceStart = Date.now();

            if (Date.now() - silenceStart > 1200) {
                stopRecording();
                return;
            }
        } else {
            silenceStart = null;
        }

        if (recording) requestAnimationFrame(detectSilence);
    }

    detectSilence();
}

function stopRecording() {
    if (mediaRecorder && recording) {
        mediaRecorder.stop();
    }

    recording = false;
    statusEl.innerText = "Pensando...";
    avatar.style.background = "#3b82f6";

    stopSound.play();
}

// ----------------------
// ENVIO PARA BACKEND
// ----------------------
async function sendAudio() {
    const blob = new Blob(audioChunks, { type: "audio/webm" });

    const formData = new FormData();
    formData.append("file", blob, "audio.webm");

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        if (data.error) {
            statusEl.innerText = data.error;
            avatar.style.background = "#ef4444";
            return;
        }

        addMessage(data.text, "user");
        addMessage(data.reply, "bot");

        statusEl.innerText = "Falando...";
        avatar.style.background = "#22c55e";

        const bytes = Uint8Array.from(
            data.audio.match(/.{1,2}/g).map(b => parseInt(b, 16))
        );

        const audioBlob = new Blob([bytes], { type: "audio/wav" });
        const audio = new Audio(URL.createObjectURL(audioBlob));

        lastAudio = audio;

        audio.play();

        audio.onended = () => {
            statusEl.innerText = "Aguardando 'Bimo'...";
            avatar.style.background = "#22c55e";
            startWakeWord();
        };

    } catch (err) {
        console.error(err);
        statusEl.innerText = "Erro na conexão";
        avatar.style.background = "#ef4444";
    }
}

// ----------------------
// CHAT UI
// ----------------------
function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = `msg ${type}`;
    div.innerText = text;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// ----------------------
// REPLAY ÁUDIO
// ----------------------
function replayAudio() {
    if (lastAudio) {
        lastAudio.currentTime = 0;
        lastAudio.play();
    }
}
</script>

</body>
</html>
